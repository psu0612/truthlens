<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruthLens — Deepfake Provenance Registry on Rialo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06060A;color:#D8D5D0;font-family:'Outfit',sans-serif;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
.top-nav{position:sticky;top:0;z-index:100;background:rgba(6,6,10,0.85);backdrop-filter:blur(16px);border-bottom:1px solid #12121A;padding:0 20px}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;height:52px;gap:24px}
.logo{cursor:pointer;display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#00D4AA,#0088CC);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#06060A;font-family:'Outfit',sans-serif}
.logo-text{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:#EEECEA;letter-spacing:-0.3px}
.step-nav{display:flex;gap:2px;flex:1;justify-content:center;overflow:auto}
.step-btn{padding:6px 12px;border-radius:6px;border:none;background:transparent;color:#555;font-size:11.5px;font-weight:400;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap;transition:all 0.15s ease}
.step-btn.active{background:#00D4AA15;color:#00D4AA;font-weight:600}
.built-on{font-family:'JetBrains Mono',monospace;font-size:9px;color:#333;letter-spacing:1px;flex-shrink:0}
.main{max-width:960px;margin:0 auto;padding:32px 20px;transition:all 0.4s ease}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}
.card{background:#0A0A12;border:1px solid #14141E;border-radius:12px;padding:28px}
.step-header{display:flex;align-items:center;gap:12px}
.step-num{font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;color:#00D4AA20;line-height:1}
.step-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;color:#EEECEA}
h3{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:#EEECEA;margin:0 0 14px}
.explain-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.explain-dot{color:#00D4AA;font-size:7px;margin-top:6px;flex-shrink:0}
.explain-text{font-size:13px;color:#999;line-height:1.6}
.rialo-tech{padding:14px;background:#0A0A12;border:1px solid #14141E;border-radius:8px;margin-bottom:16px}
.rialo-tech-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;color:#00D4AA;margin-bottom:8px;font-weight:600;text-transform:uppercase}
.rialo-tech-item{font-size:11.5px;color:#777;line-height:1.5;margin-bottom:4px}
.nav-buttons{display:flex;gap:8px}
.btn-back{padding:8px 18px;border-radius:6px;border:1px solid #1A1A28;background:transparent;color:#888;font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif}
.btn-next{padding:8px 18px;border-radius:6px;border:none;background:#00D4AA15;color:#00D4AA;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif}
.btn-primary{padding:14px 36px;border-radius:10px;border:none;background:linear-gradient(135deg,#00D4AA,#0088CC);color:#06060A;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;letter-spacing:-0.2px}
.btn-register{padding:12px 32px;border-radius:8px;border:none;background:linear-gradient(135deg,#00D4AA,#0088CC);color:#06060A;font-weight:700;font-size:14px;font-family:'Outfit',sans-serif;cursor:pointer;margin-top:8px}
.btn-alert{margin-top:16px;padding:10px 24px;border-radius:8px;border:none;background:#E6394620;color:#E63946;font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;width:100%}
.code-line{font-family:'JetBrains Mono',monospace;font-size:10px;color:#00D4AA80;letter-spacing:0.5px}
.code-item{font-family:'JetBrains Mono',monospace;font-size:10.5px;display:flex;gap:6px}
.code-key{color:#555}.code-val{color:#AAA}.code-green{color:#00D4AA}.code-red{color:#E63946}
.spinner{width:32px;height:32px;border:3px solid #14141E;border-top:3px solid #00D4AA;border-radius:50%;margin:0 auto 12px;animation:spin 0.8s linear infinite}
.spinner-sm{width:28px;height:28px;border:3px solid #14141E;border-top:3px solid #00D4AA;border-radius:50%;margin:0 auto 10px;animation:spin 0.8s linear infinite}
.verify-card{flex:1;padding:18px 14px;border-radius:10px;background:#0E0E18;border:1px solid #1A1A28;cursor:pointer;text-align:center;transition:border-color 0.2s ease}
.verify-card:hover{border-color:#333}
.verify-card:disabled{opacity:0.5;cursor:not-allowed}
.mini-box{padding:10px;border-radius:8px;text-align:center;transition:all 0.5s ease;min-width:70px}
.mini-box.active{background:#00D4AA08;border:1px solid #00D4AA25}
.mini-box.inactive{background:#0E0E18;border:1px solid #14141E}
.flow-arrow-h{flex:1;height:2px;margin:0 4px;background:linear-gradient(90deg,#00D4AA30,#00D4AA10)}
.flow-step{display:flex;gap:10px;align-items:flex-start;padding:8px 0;padding-left:14px;margin-left:8px}
.flow-step.done{border-left:2px solid #00D4AA30}
.flow-step.active-step{border-left:2px solid #E6394630}
.flow-step.pending{border-left:2px solid #14141E}
.flow-circle{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.stat-card{background:#0A0A12;border:1px solid #14141E;border-radius:10px;padding:18px}
.stat-value{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;margin-bottom:2px}
.stat-label{font-size:12px;font-weight:600;color:#BBB}
.stat-sub{font-size:10px;color:#555}
.tech-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;background:#0A0A12;border:1px solid #1A1A28;border-radius:4px;color:#555}
.activity-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.activity-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.roadmap-item{padding:10px 12px;border-radius:8px;margin-bottom:6px}
.roadmap-item.current{background:#00D4AA08;border:1px solid #00D4AA20}
.roadmap-item.future{border:1px solid transparent}
.hidden{display:none}
@media(max-width:700px){.two-col{grid-template-columns:1fr}.four-col{grid-template-columns:repeat(2,1fr)!important}}
</style>
</head>
<body>

<!-- NAV -->
<div class="top-nav">
<div class="nav-inner">
  <div class="logo" onclick="goTo('landing')">
    <div class="logo-icon">T</div>
    <span class="logo-text">TruthLens</span>
  </div>
  <div class="step-nav" id="stepNav"></div>
  <div class="built-on">BUILT ON RIALO</div>
</div>
</div>

<!-- MAIN -->
<div class="main" id="mainContent"></div>

<script>
const STEPS = [
  {id:"landing",label:"Home"},
  {id:"capture",label:"1. Capture"},
  {id:"register",label:"2. Register"},
  {id:"verify",label:"3. Verify"},
  {id:"alert",label:"4. Alert"},
  {id:"dashboard",label:"Dashboard"},
];

let currentStep = "landing";
let registered = false;
let registering = false;
let verifyResult = null;
let verifying = false;
let alertSent = false;

function goTo(step) {
  currentStep = step;
  if(step==="register"){registered=false;registering=false;}
  if(step==="verify"){verifyResult=null;verifying=false;}
  if(step==="alert"){alertSent=false;}
  render();
}

function renderNav() {
  const nav = document.getElementById("stepNav");
  nav.innerHTML = STEPS.map(s =>
    `<button class="step-btn ${currentStep===s.id?'active':''}" onclick="goTo('${s.id}')">${s.label}</button>`
  ).join("");
}

function render() {
  renderNav();
  const m = document.getElementById("mainContent");
  switch(currentStep) {
    case "landing": m.innerHTML = renderLanding(); break;
    case "capture": m.innerHTML = renderCapture(); break;
    case "register": m.innerHTML = renderRegister(); break;
    case "verify": m.innerHTML = renderVerify(); break;
    case "alert": m.innerHTML = renderAlert(); break;
    case "dashboard": m.innerHTML = renderDashboard(); break;
  }
}

function renderLanding() {
  return `
  <div style="text-align:center;padding:60px 0 40px">
    <div style="width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,170,0.15) 0%,transparent 70%);margin:0 auto 32px;display:flex;align-items:center;justify-content:center">
      <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#00D4AA,#0088CC);display:flex;align-items:center;justify-content:center;font-size:28px">🔍</div>
    </div>
    <h1 style="font-size:clamp(32px,5vw,48px);font-weight:900;line-height:1.1;margin:0 0 16px;background:linear-gradient(135deg,#EEECEA 0%,#00D4AA 60%,#0088CC 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent">TruthLens</h1>
    <p style="font-size:18px;color:#888;font-weight:400;margin:0 0 8px">Deepfake Provenance Registry on Rialo</p>
    <p style="font-size:14px;color:#555;max-width:520px;margin:0 auto 36px;line-height:1.7">Every photo and video is recorded on-chain the moment it's captured.<br>Whether it's AI-generated or real — the chain proves it.</p>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:640px;margin:0 auto 40px" class="four-col">
      ${[{icon:"📸",title:"Capture",desc:"Device TEE creates\nhash + signature",step:"capture"},
         {icon:"⛓️",title:"Register",desc:"Encrypted and stored\non-chain via REX",step:"register"},
         {icon:"🔍",title:"Verify",desc:"Compare hash to detect\ntampering instantly",step:"verify"},
         {icon:"🚨",title:"Alert",desc:"Unverified content\nautomatically flagged",step:"alert"}
      ].map(s=>`
        <div class="card" style="padding:18px 12px;cursor:pointer" onclick="goTo('${s.step}')">
          <div style="font-size:24px;margin-bottom:10px">${s.icon}</div>
          <div style="font-size:13px;font-weight:700;color:#00D4AA;margin-bottom:6px">${s.title}</div>
          <div style="font-size:11px;color:#666;line-height:1.5;white-space:pre-line">${s.desc}</div>
        </div>
      `).join("")}
    </div>
    <button class="btn-primary" onclick="goTo('capture')">Start Demo →</button>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:32px;flex-wrap:wrap">
      ${["REX (TEE)","Reactive TX","Native Oracle","RISC-V VM"].map(t=>`<span class="tech-badge">${t}</span>`).join("")}
    </div>
  </div>`;
}

function renderCapture() {
  return `
  <div class="step-header"><div class="step-num">01</div><h2 class="step-title">Capture — Creating Proof at the Moment of Capture</h2></div>
  <div class="two-col">
    <div class="card" style="display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="width:80px;height:80px;border-radius:16px;background:linear-gradient(135deg,#1a1a28,#0A0A12);border:2px solid #00D4AA30;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:20px">📱</div>
      <div style="width:2px;height:20px;background:linear-gradient(180deg,#00D4AA40,#00D4AA10);margin:4px auto"></div>
      <div style="background:#00D4AA08;border:1px solid #00D4AA20;border-radius:10px;padding:16px;width:100%;margin-top:12px">
        <div class="code-line">// TEE Enclave</div>
        <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
          <div class="code-item"><span class="code-key">image_hash:</span><span class="code-val">SHA-256: 7f3a...c8b2</span></div>
          <div class="code-item"><span class="code-key">device_sig:</span><span class="code-val">TEE_RSA: 9d2e...f1a0</span></div>
          <div class="code-item"><span class="code-key">gps:</span><span class="code-val">37.2636°N, 127.0286°E</span></div>
          <div class="code-item"><span class="code-key">timestamp:</span><span class="code-val">2026-03-04T14:23:07Z</span></div>
          <div class="code-item"><span class="code-key">device_id:</span><span class="code-val">Samsung_S25_TEE_cert</span></div>
        </div>
      </div>
    </div>
    <div style="padding:8px 0">
      <h3>The Moment You Press the Shutter</h3>
      ${explainList(["Your phone's TEE (secure chip) generates a SHA-256 hash of the photo or video","The TEE's private key creates a digital signature — this signature cannot be forged outside the device","GPS coordinates and the exact capture time are recorded alongside it","All of this data is packaged and prepared for submission to Rialo"])}
      ${rialoTech("Rialo Technology Used",["Device TEE ↔ Rialo REX: REX verifies the signature generated by the device TEE","Native Oracle: Verifies the device manufacturer's certificate to confirm it's a real device"])}
      <div class="nav-buttons"><button class="btn-next" onclick="goTo('register')">Next →</button></div>
    </div>
  </div>`;
}

function renderRegister() {
  let centerContent = "";
  if(!registering && !registered) {
    centerContent = `<button class="btn-register" onclick="doRegister()">Register on Rialo →</button>`;
  } else if(registering) {
    centerContent = `<div style="text-align:center;margin-top:8px"><div class="spinner"></div><div style="font-size:12px;color:#00D4AA">Encrypting & registering on REX...</div></div>`;
  } else {
    centerContent = `
    <div style="background:#00D4AA10;border:1px solid #00D4AA30;border-radius:8px;padding:14px;width:100%;margin-top:8px">
      <div style="font-size:20px;text-align:center;margin-bottom:8px">✅</div>
      <div class="code-item"><span class="code-key">tx_hash:</span><span class="code-val">0xr1a10...7f3a2b</span></div>
      <div class="code-item"><span class="code-key">block:</span><span class="code-val">#1,847,293</span></div>
      <div class="code-item"><span class="code-key">status:</span><span class="code-green">REGISTERED</span></div>
      <div class="code-item"><span class="code-key">privacy:</span><span class="code-val">Encrypted in REX (TEE)</span></div>
    </div>`;
  }

  return `
  <div class="step-header"><div class="step-num">02</div><h2 class="step-title">Register — Encrypted On-Chain Registration</h2></div>
  <div class="two-col">
    <div class="card" style="display:flex;flex-direction:column;align-items:center">
      <div style="width:100%;margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div class="mini-box active"><div style="font-size:18px;margin-bottom:4px">📱</div><div style="font-size:9px;color:#00D4AA;font-weight:500">Device TEE</div></div>
          <div class="flow-arrow-h"></div>
          <div class="mini-box ${(registering||registered)?'active':'inactive'}"><div style="font-size:18px;margin-bottom:4px">🔐</div><div style="font-size:9px;color:${(registering||registered)?'#00D4AA':'#444'};font-weight:500">Rialo REX</div></div>
          <div class="flow-arrow-h"></div>
          <div class="mini-box ${registered?'active':'inactive'}"><div style="font-size:18px;margin-bottom:4px">⛓️</div><div style="font-size:9px;color:${registered?'#00D4AA':'#444'};font-weight:500">On-Chain</div></div>
        </div>
      </div>
      ${centerContent}
    </div>
    <div style="padding:8px 0">
      <h3>Permanently Recorded on Rialo</h3>
      ${explainList(["The capture data package is encrypted and stored in Rialo's REX (confidential computing layer)","The original photo or video is never uploaded — only the hash and metadata are recorded","The device TEE signature is verified inside REX to confirm 'captured by a real camera'","Once registered, a tamper-proof timestamp is permanently stored on-chain"])}
      ${rialoTech("Rialo Technology Used",["REX (TEE): Encrypts and stores capture metadata — no third party can access it","RISC-V VM: Executes TEE signature verification logic deterministically","Stake-for-Service: Registration gas fees are automatically covered by staking rewards"])}
      <div class="nav-buttons"><button class="btn-back" onclick="goTo('capture')">← Back</button><button class="btn-next" onclick="goTo('verify')">Next →</button></div>
    </div>
  </div>`;
}

function doRegister() {
  registering = true;
  render();
  setTimeout(()=>{registering=false;registered=true;render();},2200);
}

function renderVerify() {
  let resultHTML = "";
  if(verifying) {
    resultHTML = `<div style="text-align:center;padding:16px 0"><div class="spinner-sm"></div><div style="font-size:12px;color:#888">Comparing hash against on-chain registry...</div></div>`;
  } else if(verifyResult==="verified") {
    resultHTML = resultBox("#00D4AA","✅","VERIFIED — Original Confirmed",[
      {k:"match",v:"Hash matches on-chain record"},
      {k:"device",v:"Samsung S25 (TEE certified)"},
      {k:"location",v:"Suwon, Gyeonggi-do, KR"},
      {k:"captured",v:"2026-03-04 14:23:07 KST"},
      {k:"tampered",v:"NO — Original intact",cls:"code-green"},
    ]);
  } else if(verifyResult==="fake") {
    resultHTML = resultBox("#E63946","⚠️","NOT VERIFIED — No Original Record Found",[
      {k:"match",v:"No matching hash found"},
      {k:"device",v:"No TEE signature"},
      {k:"ai_detect",v:"AI-generated patterns detected"},
      {k:"risk",v:"HIGH — Possible deepfake",cls:"code-red"},
    ]);
  }

  return `
  <div class="step-header"><div class="step-num">03</div><h2 class="step-title">Verify — Instantly Check Real or Fake</h2></div>
  <div class="two-col">
    <div class="card">
      <div style="font-size:13px;font-weight:600;color:#888;margin-bottom:16px">Select content to verify:</div>
      <div style="display:flex;gap:10px;margin-bottom:20px">
        <button class="verify-card" onclick="doVerify('real')" ${verifying?'disabled':''}>
          <div style="font-size:28px;margin-bottom:8px">📸</div>
          <div style="font-size:13px;font-weight:600;color:#EEECEA">Real Photo</div>
          <div style="font-size:10px;color:#555;margin-top:2px">Registered on TruthLens</div>
        </button>
        <button class="verify-card" onclick="doVerify('fake')" ${verifying?'disabled':''}>
          <div style="font-size:28px;margin-bottom:8px">🤖</div>
          <div style="font-size:13px;font-weight:600;color:#EEECEA">Deepfake Video</div>
          <div style="font-size:10px;color:#555;margin-top:2px">AI-generated, unregistered</div>
        </button>
      </div>
      ${resultHTML}
    </div>
    <div style="padding:8px 0">
      <h3>Anyone Can Verify Instantly</h3>
      ${explainList(["The content's hash is computed and compared against the on-chain registry","If the hash matches, it confirms 'this content is an original captured by a real camera'","If no hash is found, it's unregistered — an AI detection model runs additional analysis","Even changing a single pixel completely alters the hash, so any edit is detected instantly"])}
      ${rialoTech("Rialo Technology Used",["REX: Performs hash comparison in a confidential computing environment","Native Oracle: Cryptographically verifies the AI detection model's results","Reactive TX: Automatically triggers the next step (alert) based on verification results"])}
      <div class="nav-buttons"><button class="btn-back" onclick="goTo('register')">← Back</button><button class="btn-next" onclick="goTo('alert')">Next →</button></div>
    </div>
  </div>`;
}

function doVerify(type) {
  verifying=true;verifyResult=null;render();
  setTimeout(()=>{verifying=false;verifyResult=type==="real"?"verified":"fake";render();},2000);
}

function renderAlert() {
  return `
  <div class="step-header"><div class="step-num">04</div><h2 class="step-title">Alert — Automatic Warnings for Unverified Content</h2></div>
  <div class="two-col">
    <div class="card">
      <div style="font-size:13px;font-weight:600;color:#888;margin-bottom:16px">Reactive Transaction Flow</div>
      ${flowStep(1,"Content uploaded to social media",true,false)}
      ${flowStep(2,"Reactive TX auto-triggers — hash comparison",true,false)}
      ${flowStep(3,"Unregistered — AI detection model runs",true,false)}
      ${flowStep(4,alertSent?"⚠️ Warning label automatically attached":"Waiting to attach warning label...",alertSent,!alertSent)}
      ${!alertSent?`<button class="btn-alert" onclick="doAlert()">Simulate Alert →</button>`:`
      <div style="margin-top:16px;padding:14px;background:#E6394610;border:1px solid #E6394630;border-radius:8px">
        <div style="font-size:13px;font-weight:600;color:#E63946;margin-bottom:8px">⚠️ TruthLens Warning</div>
        <div style="font-size:12px;color:#999;line-height:1.6">This content has <strong style="color:#E63946">no verified origin</strong> in the TruthLens registry. AI analysis suggests this may be synthetically generated.<br><br><span style="color:#666">Verified by Rialo on-chain • Block #1,847,301</span></div>
      </div>`}
    </div>
    <div style="padding:8px 0">
      <h3>Fully Automated — No Human Intervention Needed</h3>
      ${explainList(["When a video is uploaded to social media, a Reactive Transaction automatically triggers","No bots or external services needed — the chain itself performs the hash comparison","Unverified content gets an 'Unverified Origin' warning label automatically attached","AI content creators who voluntarily register get an 'AI Generated' label instead"])}
      ${rialoTech("Rialo Technology Used",["Reactive TX: Detects upload events and auto-executes the full verify → alert workflow","REX: Runs verification logic in a confidential environment — preventing bypass","Stake-for-Service: Gas fees for automated verification are covered by staking rewards"])}
      <div class="nav-buttons"><button class="btn-back" onclick="goTo('verify')">← Back</button><button class="btn-next" onclick="goTo('dashboard')">Next →</button></div>
    </div>
  </div>`;
}

function doAlert(){alertSent=true;render();}

function renderDashboard() {
  const stats = [
    {label:"Registered",value:"2,847,103",sub:"photos & videos",color:"#00D4AA"},
    {label:"Verified",value:"1,293,847",sub:"verification requests",color:"#0088CC"},
    {label:"Flagged",value:"34,291",sub:"unverified content",color:"#E63946"},
    {label:"Partners",value:"147",sub:"device manufacturers",color:"#F4A261"},
  ];
  const activities = [
    {time:"2s ago",event:"Photo registered",detail:"iPhone 17 Pro",color:"#0088CC"},
    {time:"5s ago",event:"Verification request",detail:"✅ Original confirmed",color:"#00D4AA"},
    {time:"8s ago",event:"Deepfake flagged",detail:"X (Twitter)",color:"#E63946"},
    {time:"12s ago",event:"Video registered",detail:"Samsung S25",color:"#0088CC"},
    {time:"15s ago",event:"AI content labeled",detail:"Creator_0x8f2a",color:"#F4A261"},
  ];
  const roadmap = [
    {phase:"Phase 1",title:"MVP — Demo & Concept",status:"NOW",desc:"Interactive prototype, Shark Tank pitch, community feedback",current:true},
    {phase:"Phase 2",title:"SDK & Partnerships",status:"Q3 2026",desc:"Camera manufacturer SDK, browser extension for verification"},
    {phase:"Phase 3",title:"SNS Integration",status:"Q4 2026",desc:"Platform plugins (X, Instagram), Reactive TX auto-verification"},
    {phase:"Phase 4",title:"Global Registry",status:"2027",desc:"News agency partnerships, government adoption, legal framework"},
  ];

  return `
  <div class="step-header"><div class="step-num">📊</div><h2 class="step-title">TruthLens Dashboard</h2></div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:24px" class="four-col">
    ${stats.map(s=>`<div class="stat-card"><div class="stat-value" style="color:${s.color}">${s.value}</div><div class="stat-label">${s.label}</div><div class="stat-sub">${s.sub}</div></div>`).join("")}
  </div>
  <div class="two-col" style="margin-top:16px">
    <div class="card" style="padding:20px">
      <div style="font-size:14px;font-weight:700;color:#EEECEA;margin-bottom:14px">Recent Activity</div>
      ${activities.map((a,i)=>`
        <div class="activity-row" style="${i<4?'border-bottom:1px solid #0E0E18':''}">
          <div class="activity-dot" style="background:${a.color}"></div>
          <div style="flex:1"><div style="font-size:12px;color:#BBB">${a.event}</div><div style="font-size:10px;color:#555">${a.detail}</div></div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#444">${a.time}</div>
        </div>
      `).join("")}
    </div>
    <div class="card" style="padding:20px">
      <div style="font-size:14px;font-weight:700;color:#EEECEA;margin-bottom:14px">Roadmap</div>
      ${roadmap.map(r=>`
        <div class="roadmap-item ${r.current?'current':'future'}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
            <span style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;color:${r.current?'#00D4AA':'#555'};font-weight:600">${r.phase}</span>
            <span style="font-size:12px;font-weight:600;color:${r.current?'#EEECEA':'#999'}">${r.title}</span>
            <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:${r.current?'#00D4AA':'#444'}">${r.status}</span>
          </div>
          <div style="font-size:11px;color:#666">${r.desc}</div>
        </div>
      `).join("")}
    </div>
  </div>
  <div style="margin-top:24px;padding:20px;background:#00D4AA08;border:1px solid #00D4AA20;border-radius:12px;text-align:center">
    <div style="font-size:18px;font-weight:700;color:#EEECEA;margin-bottom:6px">TruthLens — See the Truth</div>
    <div style="font-size:13px;color:#888">Built on Rialo's REX, Reactive Transactions, and Native Oracle</div>
  </div>`;
}

// Helpers
function explainList(items) {
  return `<div style="margin-bottom:20px">${items.map(i=>`<div class="explain-item"><span class="explain-dot">●</span><span class="explain-text">${i}</span></div>`).join("")}</div>`;
}
function rialoTech(title,items) {
  return `<div class="rialo-tech"><div class="rialo-tech-title">${title.toUpperCase()}</div>${items.map(i=>`<div class="rialo-tech-item">→ ${i}</div>`).join("")}</div>`;
}
function resultBox(color,icon,title,items) {
  return `<div style="background:${color}08;border:1px solid ${color}25;border-radius:8px;padding:14px"><div style="font-size:14px;font-weight:700;color:${color};margin-bottom:10px">${icon} ${title}</div><div style="display:flex;flex-direction:column;gap:3px">${items.map(i=>`<div class="code-item"><span class="code-key">${i.k}:</span><span class="${i.cls||'code-val'}">${i.v}</span></div>`).join("")}</div></div>`;
}
function flowStep(num,text,done,active) {
  const cls = done?"done":active?"active-step":"pending";
  const circBg = done?"#00D4AA20":active?"#E6394620":"#14141E";
  const circColor = done?"#00D4AA":active?"#E63946":"#444";
  const textColor = done?"#BBB":active?"#E63946":"#555";
  return `<div class="flow-step ${cls}"><div class="flow-circle" style="background:${circBg};color:${circColor}">${num}</div><div style="font-size:12.5px;color:${textColor};font-weight:${active?600:400}">${text}</div></div>`;
}

// Init
render();
</script>
</body>
</html>
